services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    privileged: true
    volumes:
      - ..:/workspaces/aviation-ops-briefing-agent:cached
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ops_briefing
      POSTGRES_USER: ops
      POSTGRES_PASSWORD: ops_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
